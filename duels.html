<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Дуэль с ботом — Telegram Mini App</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1a 100%);
            font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
            padding: 16px;
            min-height: 100vh;
            color: #eee;
            margin: 0;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        /* Карточки */
        .card {
            background: rgba(15, 25, 45, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 24px 20px;
            margin-bottom: 16px;
            border: 1px solid rgba(233, 69, 96, 0.3);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .title {
            font-size: 2rem;
            text-align: center;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .subtitle {
            text-align: center;
            font-size: 0.8rem;
            color: #b89a6e;
            margin-bottom: 24px;
        }

        /* HP бары */
        .hp-section {
            margin: 20px 0;
        }

        .hp-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .hp-bar-container {
            background: #2a2a3a;
            border-radius: 20px;
            height: 28px;
            overflow: hidden;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
        }

        .hp-bar {
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            height: 100%;
            width: 100%;
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 12px;
            font-size: 0.75rem;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 2px black;
        }

        /* Слайдер урона */
        .damage-section {
            margin: 20px 0;
        }

        .damage-slider {
            width: 100%;
            height: 6px;
            -webkit-appearance: none;
            background: #2a2a3a;
            border-radius: 10px;
            outline: none;
            margin: 12px 0;
        }

        .damage-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            background: #e94560;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 8px #e94560;
            border: 2px solid white;
        }

        .damage-value {
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            color: #ff6b6b;
        }

        /* Кнопки */
        .btn {
            background: #e94560;
            border: none;
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 14px 24px;
            border-radius: 60px;
            width: 100%;
            margin: 8px 0;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            font-family: inherit;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn:disabled {
            opacity: 0.5;
            transform: none;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #2a4a7a;
        }

        .btn-reset {
            background: #6a1a2a;
        }

        /* Индикатор хода */
        .turn-indicator {
            text-align: center;
            padding: 12px;
            border-radius: 40px;
            background: rgba(0, 0, 0, 0.4);
            margin: 16px 0 8px;
            font-weight: bold;
            font-size: 1rem;
        }

        /* Статистика */
        .stats {
            display: flex;
            justify-content: space-around;
            text-align: center;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .stat-value {
            font-size: 1.6rem;
            font-weight: bold;
            color: #ffd700;
        }

        .stat-label {
            font-size: 0.7rem;
            opacity: 0.7;
        }

        /* Лог боя */
        .log {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            padding: 10px;
            margin-top: 16px;
            font-size: 0.75rem;
            max-height: 80px;
            overflow-y: auto;
            font-family: monospace;
        }

        .log p {
            margin: 4px 0;
            border-left: 2px solid #e94560;
            padding-left: 8px;
        }

        /* Анимация удара */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .hit-effect {
            animation: shake 0.2s ease-in-out;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="title">⚔️ ДУЭЛЬ ⚔️</div>
        <div class="subtitle">сражение с могучим ботом</div>

        <!-- HP Противника -->
        <div class="hp-section">
            <div class="hp-label">
                <span>🤖 ПРОТИВНИК (БОТ)</span>
                <span id="botHpText">100</span>
            </div>
            <div class="hp-bar-container">
                <div id="botHpBar" class="hp-bar" style="width: 100%">100</div>
            </div>
        </div>

        <!-- HP Игрока -->
        <div class="hp-section">
            <div class="hp-label">
                <span>😎 ВЫ</span>
                <span id="playerHpText">100</span>
            </div>
            <div class="hp-bar-container">
                <div id="playerHpBar" class="hp-bar" style="width: 100%">100</div>
            </div>
        </div>

        <!-- Настройка урона -->
        <div class="damage-section">
            <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                <span>💥 СИЛА ВЫСТРЕЛА</span>
                <span class="damage-value" id="damageValue">25</span>
            </div>
            <input type="range" id="damageSlider" class="damage-slider" min="10" max="40" value="25">
            <div style="font-size: 0.7rem; text-align: center; opacity: 0.6;">🔫 больше урон — меньше точность</div>
        </div>

        <!-- Кнопки управления -->
        <button id="attackBtn" class="btn">🔫 ВЫСТРЕЛИТЬ!</button>
        <button id="resetBtn" class="btn btn-reset">🔄 НОВАЯ ДУЭЛЬ</button>

        <!-- Индикатор хода -->
        <div class="turn-indicator" id="turnText">
            ⚡ ВАШ ХОД
        </div>

        <!-- Лог боя -->
        <div class="log" id="logArea">
            <p>✨ Дуэль началась! Ваш ход.</p>
        </div>

        <!-- Статистика -->
        <div class="stats">
            <div>
                <div class="stat-value" id="winsCount">0</div>
                <div class="stat-label">ПОБЕДЫ</div>
            </div>
            <div>
                <div class="stat-value" id="lossesCount">0</div>
                <div class="stat-label">ПОРАЖЕНИЯ</div>
            </div>
            <div>
                <div class="stat-value" id="duelsCount">0</div>
                <div class="stat-label">ВСЕГО ДУЭЛЕЙ</div>
            </div>
        </div>
    </div>
</div>

<script>
    // ========== ИГРОВЫЕ ПЕРЕМЕННЫЕ ==========
    let playerHp = 100;
    let botHp = 100;
    let gameActive = true;
    let isPlayerTurn = true;
    let isBotThinking = false;
    
    // Статистика
    let wins = 0;
    let losses = 0;
    let totalDuels = 0;
    
    // DOM элементы
    const playerHpText = document.getElementById('playerHpText');
    const botHpText = document.getElementById('botHpText');
    const playerHpBar = document.getElementById('playerHpBar');
    const botHpBar = document.getElementById('botHpBar');
    const attackBtn = document.getElementById('attackBtn');
    const resetBtn = document.getElementById('resetBtn');
    const damageSlider = document.getElementById('damageSlider');
    const damageValue = document.getElementById('damageValue');
    const turnText = document.getElementById('turnText');
    const logArea = document.getElementById('logArea');
    const winsCount = document.getElementById('winsCount');
    const lossesCount = document.getElementById('lossesCount');
    const duelsCount = document.getElementById('duelsCount');
    
    // ========== ЗАГРУЗКА СТАТИСТИКИ ==========
    function loadStats() {
        if (localStorage.getItem('duel_wins')) {
            wins = parseInt(localStorage.getItem('duel_wins'));
            losses = parseInt(localStorage.getItem('duel_losses'));
            totalDuels = parseInt(localStorage.getItem('duel_total')) || wins + losses;
        }
        updateStatsUI();
    }
    
    function saveStats() {
        localStorage.setItem('duel_wins', wins);
        localStorage.setItem('duel_losses', losses);
        localStorage.setItem('duel_total', totalDuels);
        updateStatsUI();
    }
    
    function updateStatsUI() {
        winsCount.textContent = wins;
        lossesCount.textContent = losses;
        duelsCount.textContent = totalDuels;
    }
    
    // ========== ЛОГИРОВАНИЕ ==========
    function addLog(message, isError = false) {
        const p = document.createElement('p');
        p.innerHTML = message;
        p.style.borderLeftColor = isError ? '#ff6b6b' : '#e94560';
        logArea.appendChild(p);
        p.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        
        // Ограничиваем лог 12 строками
        while (logArea.children.length > 12) {
            logArea.removeChild(logArea.firstChild);
        }
    }
    
    // ========== ОБНОВЛЕНИЕ UI ==========
    function updateUI() {
        const playerPercent = (playerHp / 100) * 100;
        const botPercent = (botHp / 100) * 100;
        
        playerHpBar.style.width = `${playerPercent}%`;
        botHpBar.style.width = `${botPercent}%`;
        
        playerHpText.textContent = playerHp;
        botHpText.textContent = botHp;
        
        // Меняем цвет при низком HP
        if (playerPercent < 30) {
            playerHpBar.style.background = "linear-gradient(90deg, #a1331f, #cf4a2e)";
        } else {
            playerHpBar.style.background = "linear-gradient(90deg, #e94560, #ff6b6b)";
        }
        
        if (botPercent < 30) {
            botHpBar.style.background = "linear-gradient(90deg, #a1331f, #cf4a2e)";
        } else {
            botHpBar.style.background = "linear-gradient(90deg, #e94560, #ff6b6b)";
        }
        
        // Обновляем текст в барах
        playerHpBar.innerHTML = playerPercent > 15 ? `${playerHp}` : '';
        botHpBar.innerHTML = botPercent > 15 ? `${botHp}` : '';
    }
    
    // ========== ПРОВЕРКА ОКОНЧАНИЯ ИГРЫ ==========
    function checkGameOver() {
        if (playerHp <= 0) {
            gameActive = false;
            playerHp = 0;
            updateUI();
            losses++;
            totalDuels++;
            saveStats();
            turnText.innerHTML = '💔 ВЫ ПРОИГРАЛИ...';
            turnText.style.background = '#6a1a2a';
            attackBtn.disabled = true;
            addLog('💀 ВЫ ПАЛИ НА ЗЕМЛЮ... Поражение! 💀', true);
            return true;
        }
        if (botHp <= 0) {
            gameActive = false;
            botHp = 0;
            updateUI();
            wins++;
            totalDuels++;
            saveStats();
            turnText.innerHTML = '🏆 ПОБЕДА! 🏆';
            turnText.style.background = '#2a7a4a';
            attackBtn.disabled = true;
            addLog('🏆 ВАША МЕТКОСТЬ ПРОСЛАВИЛА ВАС! ПОБЕДА! 🏆');
            return true;
        }
        return false;
    }
    
    // ========== РАСЧЁТ ТОЧНОСТИ ==========
    function calculateHitChance(damage) {
        // Чем больше урон, тем меньше точность
        // 10 урона = 95% точность, 40 урона = 65% точность
        let accuracy = 95 - (damage - 10) * 1.2;
        accuracy = Math.min(95, Math.max(55, accuracy));
        return accuracy;
    }
    
    // ========== АТАКА ИГРОКА ==========
    function playerAttack() {
        if (!gameActive) {
            addLog('Дуэль уже завершена. Начните новую!', true);
            return;
        }
        if (!isPlayerTurn) {
            addLog('Сейчас не ваш ход! Дождитесь атаки бота.', true);
            return;
        }
        if (isBotThinking) return;
        
        const damage = parseInt(damageSlider.value);
        const hitChance = calculateHitChance(damage);
        const isHit = Math.random() * 100 <= hitChance;
        
        // Эффект удара
        document.querySelector('.container').classList.add('hit-effect');
        setTimeout(() => document.querySelector('.container').classList.remove('hit-effect'), 200);
        
        if (isHit) {
            botHp = Math.max(0, botHp - damage);
            updateUI();
            addLog(`🔫 ВЫ ВЫСТРЕЛИЛИ! Попадание! Урон ${damage}. У бота осталось ${botHp} HP`);
            
            if (checkGameOver()) return;
        } else {
            addLog(`🍃 ВЫ ВЫСТРЕЛИЛИ! Промах! Пуля ушла в молоко. (Точность была ${Math.round(hitChance)}%)`, true);
        }
        
        // Ход переходит боту
        isPlayerTurn = false;
        turnText.innerHTML = '🤖 ХОД БОТА...';
        turnText.style.background = '#2a4a7a';
        attackBtn.disabled = true;
        
        // Бот атакует с задержкой
        isBotThinking = true;
        setTimeout(() => botAttack(), 800);
    }
    
    // ========== АТАКА БОТА ==========
    function botAttack() {
        if (!gameActive) {
            isBotThinking = false;
            return;
        }
        
        // Бот выбирает случайный урон
        const botDamage = Math.floor(Math.random() * 35) + 10;
        // У бота тоже есть точность
        const botHitChance = 75;
        const isHit = Math.random() * 100 <= botHitChance;
        
        if (isHit) {
            playerHp = Math.max(0, playerHp - botDamage);
            updateUI();
            addLog(`🤖 БОТ АТАКУЕТ! Попадание! Урон ${botDamage}. У вас осталось ${playerHp} HP`);
            
            if (checkGameOver()) {
                isBotThinking = false;
                return;
            }
        } else {
            addLog(`🍃 БОТ ПРОМАХНУЛСЯ! Его пуля просвистела мимо.`, true);
        }
        
        // Ход переходит игроку
        isPlayerTurn = true;
        turnText.innerHTML = '🔫 ВАШ ХОД!';
        turnText.style.background = '#e94560';
        attackBtn.disabled = false;
        isBotThinking = false;
        
        // Проверяем, не закончилась ли игра после атаки бота
        checkGameOver();
    }
    
    // ========== СБРОС ИГРЫ ==========
    function resetGame() {
        playerHp = 100;
        botHp = 100;
        gameActive = true;
        isPlayerTurn = true;
        isBotThinking = false;
        
        updateUI();
        
        turnText.innerHTML = '🔫 ВАШ ХОД!';
        turnText.style.background = '#e94560';
        attackBtn.disabled = false;
        
        addLog('✨ НОВАЯ ДУЭЛЬ! Заряжаем револьверы...');
        addLog('🔫 Ваш ход первым!');
    }
    
    // ========== ИНИЦИАЛИЗАЦИЯ ==========
    damageSlider.oninput = () => {
        const val = damageSlider.value;
        damageValue.textContent = val;
    };
    
    attackBtn.onclick = playerAttack;
    resetBtn.onclick = resetGame;
    
    // Загружаем статистику
    loadStats();
    resetGame();
    
    // Поддержка Telegram WebApp
    if (window.Telegram && Telegram.WebApp) {
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();
        Telegram.WebApp.setHeaderColor('bg_color');
        Telegram.WebApp.setBackgroundColor('#1a1a2e');
    }
</script>
</body>
</html>
